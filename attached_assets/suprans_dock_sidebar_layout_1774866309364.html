<style>
*{box-sizing:border-box;margin:0;padding:0}
.shell{display:flex;height:580px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary)}
.dock{width:52px;border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px;background:var(--color-background-secondary);flex-shrink:0}
.dock-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:-.5px;flex-shrink:0;position:relative;transition:opacity .15s}
.dock-icon:hover{opacity:.85}
.dock-icon.active::before{content:'';position:absolute;left:-9px;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--color-text-primary)}
.dock-icon.active{box-shadow:0 0 0 2px var(--color-background-secondary),0 0 0 3px var(--color-border-secondary)}
.dock-divider{width:24px;height:0.5px;background:var(--color-border-tertiary);margin:4px 0}
.dock-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:4px}
.dock-user{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--color-border-tertiary)}
.sidebar{width:210px;border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;flex-shrink:0;background:var(--color-background-secondary)}
.sidebar-header{padding:14px 14px 10px;border-bottom:0.5px solid var(--color-border-tertiary)}
.portal-name-lg{font-size:14px;font-weight:600;color:var(--color-text-primary)}
.portal-tagline{font-size:11px;color:var(--color-text-tertiary);margin-top:1px}
.nav-scroll{flex:1;overflow-y:auto;padding:6px 0}
.nav-section{padding:8px 14px 3px;font-size:10px;font-weight:600;color:var(--color-text-tertiary);letter-spacing:.07em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--color-text-secondary);position:relative}
.nav-item:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.nav-item.active{color:var(--color-text-primary);font-weight:500}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2.5px;border-radius:0 2px 2px 0}
.nav-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500}
.badge-red{background:#FCEBEB;color:#A32D2D}
.badge-muted{background:var(--color-background-primary);color:var(--color-text-tertiary);border:0.5px solid var(--color-border-tertiary)}
.sidebar-footer{padding:10px 12px;border-top:0.5px solid var(--color-border-tertiary)}
.user-row{display:flex;align-items:center;gap:8px}
.avatar-sm{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{height:44px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;padding:0 16px;gap:10px}
.breadcrumb{font-size:12px;color:var(--color-text-tertiary)}
.page-title{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.btn-sm{padding:4px 10px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:none;color:var(--color-text-primary)}
.btn-primary{color:white;border:none}
.content{flex:1;padding:14px 16px;overflow-y:auto}
.stat-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.stat-label{font-size:11px;color:var(--color-text-tertiary);margin-bottom:3px}
.stat-value{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.stat-sub{font-size:11px;margin-top:2px}
.lead-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);margin-bottom:4px}
.la{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.pill{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.grid-2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
.sec-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:7px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px}
.tooltip{position:absolute;left:56px;top:50%;transform:translateY(-50%);background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:4px 9px;font-size:12px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;pointer-events:none;z-index:20;display:none}
</style>

<div class="shell" id="shell">

  <div class="dock" id="dock"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="portal-name-lg" id="pname">Sales CRM</div>
      <div class="portal-tagline" id="ptagline">Lead & pipeline management</div>
    </div>
    <div class="nav-scroll" id="nav-scroll"></div>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="avatar-sm" id="footer-avatar" style="background:#E6F1FB;color:#0C447C">LT</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:500;color:var(--color-text-primary)">Lakshay Takkar</div>
          <div style="font-size:11px;color:var(--color-text-tertiary)" id="footer-role">CEO / Super Admin</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <span class="breadcrumb" id="breadcrumb">Sales CRM</span>
      <span style="color:var(--color-border-tertiary);font-size:12px">/</span>
      <span class="page-title" id="page-title">Dashboard</span>
      <div style="flex:1"></div>
      <button class="btn-sm">Reports</button>
      <button class="btn-sm btn-primary" id="primary-btn" style="background:#10B981">+ Add lead</button>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<script>
const portals = [
  { id:'crm', name:'Sales CRM', short:'CRM', tagline:'Lead & pipeline management', color:'#10B981', textColor:'#fff',
    nav:[
      {section:'OVERVIEW', items:[{label:'Dashboard'},{label:'Analytics'}]},
      {section:'LEADS', items:[{label:'My pipeline'},{label:'All leads',badge:'47'},{label:'Lead detail'}]},
      {section:'TASKS', items:[{label:'Tasks board',badge:'3'},{label:'My tasks'}]},
      {section:'TOOLKIT', items:[{label:'Payment links'},{label:'Appointments'}]},
      {section:'SETTINGS', items:[{label:'Users & roles'}]}
    ]
  },
  { id:'ats', name:'Recruitment', short:'ATS', tagline:'Hiring & talent pipeline', color:'#8B5CF6', textColor:'#fff',
    nav:[
      {section:'OVERVIEW', items:[{label:'Dashboard'}]},
      {section:'PIPELINE', items:[{label:'Jobs'},{label:'Candidates',badge:'12'},{label:'Applications'}]},
      {section:'PROCESS', items:[{label:'Interviews',badge:'2'},{label:'Offers'},{label:'Talent pool'}]},
      {section:'REPORTS', items:[{label:'Analytics'}]}
    ]
  },
  { id:'legalnations', name:'LegalNations', short:'LN', tagline:'US company formation ops', color:'#225AEA', textColor:'#fff',
    nav:[
      {section:'OVERVIEW', items:[{label:'Dashboard'}]},
      {section:'CLIENTS', items:[{label:'All clients',badge:'249'},{label:'Pipeline'},{label:'Intake queue',badge:'8'}]},
      {section:'OPERATIONS', items:[{label:'Tax filing'},{label:'Documents'},{label:'Compliance'}]},
      {section:'REPORTS', items:[{label:'Analytics'}]}
    ]
  },
  { id:'usdrop', name:'USDrop AI', short:'USD', tagline:'SaaS dropshipping platform', color:'#F34147', textColor:'#fff',
    nav:[
      {section:'OVERVIEW', items:[{label:'Dashboard'}]},
      {section:'CLIENTS', items:[{label:'Pipeline'},{label:'All clients'},{label:'LLC tracker'}]},
      {section:'CONTENT', items:[{label:'Courses'},{label:'Free learning'}]},
      {section:'SUPPORT', items:[{label:'Tickets',badge:'5'},{label:'Help center'}]}
    ]
  },
  { id:'team', name:'Team Hub', short:'HUB', tagline:'Internal team operations', color:'#F59E0B', textColor:'#fff',
    nav:[
      {section:'OVERVIEW', items:[{label:'Dashboard'}]},
      {section:'WORK', items:[{label:'Tasks',badge:'5'},{label:'Chat',badge:'2'},{label:'Resources'}]},
      {section:'PEOPLE', items:[{label:'Team'},{label:'Attendance'},{label:'Leaves'}]},
    ]
  }
];

let activePortal = portals[0];
let activePage = 'Dashboard';

function buildDock() {
  const dock = document.getElementById('dock');
  dock.innerHTML = '';
  portals.forEach(p => {
    const wrap = document.createElement('div');
    wrap.style.position = 'relative';
    const icon = document.createElement('div');
    icon.className = 'dock-icon' + (p.id === activePortal.id ? ' active' : '');
    icon.style.background = p.color;
    icon.style.color = p.textColor;
    icon.textContent = p.short;
    icon.style.fontSize = p.short.length > 2 ? '9px' : '11px';
    const tip = document.createElement('div');
    tip.className = 'tooltip';
    tip.textContent = p.name;
    icon.onmouseenter = () => tip.style.display = 'block';
    icon.onmouseleave = () => tip.style.display = 'none';
    icon.onclick = () => { activePortal = p; activePage = 'Dashboard'; renderAll(); };
    wrap.appendChild(icon);
    wrap.appendChild(tip);
    dock.appendChild(wrap);
  });

  const div = document.createElement('div');
  div.className = 'dock-divider';
  dock.appendChild(div);

  const bottom = document.createElement('div');
  bottom.className = 'dock-bottom';

  const settingsIcon = document.createElement('div');
  settingsIcon.style.cssText = 'width:32px;height:32px;border-radius:50%;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;cursor:pointer;';
  settingsIcon.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.5" stroke="var(--color-text-tertiary)" stroke-width="1.2"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="var(--color-text-tertiary)" stroke-width="1.2" stroke-linecap="round"/></svg>';

  const userIcon = document.createElement('div');
  userIcon.className = 'dock-user';
  userIcon.style.background = activePortal.color + '22';
  userIcon.style.color = activePortal.color;
  userIcon.style.borderColor = activePortal.color + '44';
  userIcon.textContent = 'LT';

  bottom.appendChild(settingsIcon);
  bottom.appendChild(userIcon);
  dock.appendChild(bottom);
}

function buildSidebar() {
  document.getElementById('pname').textContent = activePortal.name;
  document.getElementById('ptagline').textContent = activePortal.tagline;
  document.getElementById('footer-avatar').style.background = activePortal.color + '22';
  document.getElementById('footer-avatar').style.color = activePortal.color;

  const leftBorderColor = activePortal.color;
  const ns = document.getElementById('nav-scroll');
  ns.innerHTML = '';
  activePortal.nav.forEach(group => {
    const sec = document.createElement('div');
    sec.className = 'nav-section';
    sec.textContent = group.section;
    ns.appendChild(sec);
    group.items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'nav-item' + (item.label === activePage ? ' active' : '');
      if (item.label === activePage) {
        el.style.setProperty('--active-color', leftBorderColor);
        el.querySelector = null;
        el.style.cssText += `;background:var(--color-background-primary);`;
        const pseudo = document.createElement('div');
        pseudo.style.cssText = `position:absolute;left:0;top:4px;bottom:4px;width:2.5px;border-radius:0 2px 2px 0;background:${leftBorderColor}`;
        el.appendChild(pseudo);
      }
      const dot = document.createElement('div');
      dot.className = 'nav-dot';
      dot.style.background = item.label === activePage ? leftBorderColor : 'var(--color-border-secondary)';
      el.appendChild(dot);
      const lbl = document.createElement('span');
      lbl.textContent = item.label;
      el.appendChild(lbl);
      if (item.badge) {
        const b = document.createElement('span');
        b.className = 'badge ' + (parseInt(item.badge) > 10 ? 'badge-muted' : 'badge-red');
        b.textContent = item.badge;
        el.appendChild(b);
      }
      el.onclick = () => { activePage = item.label; buildSidebar(); renderContent(); };
      ns.appendChild(el);
    });
  });
}

function renderContent() {
  document.getElementById('breadcrumb').textContent = activePortal.name;
  document.getElementById('page-title').textContent = activePage;
  const btn = document.getElementById('primary-btn');
  btn.style.background = activePortal.color;
  const btnLabels = {'Dashboard':'+ Add lead','My pipeline':'+ Add lead','All leads':'+ Add lead','Tasks board':'+ New task','Payment links':'+ New link','Appointments':'+ Schedule','Analytics':'Export','Candidates':'+ Add candidate','All clients':'+ New client','Jobs':'+ Post job'};
  btn.textContent = btnLabels[activePage] || '+ New';

  const c = document.getElementById('main-content');
  const col = activePortal.color;

  if (activePage === 'Dashboard' && activePortal.id === 'crm') {
    c.innerHTML = `<div class="stat-row">
      <div class="stat"><div class="stat-label">Total leads</div><div class="stat-value">47</div><div class="stat-sub" style="color:${col}">+8 this week</div></div>
      <div class="stat"><div class="stat-label">Follow-up due</div><div class="stat-value" style="color:#A32D2D">12</div><div class="stat-sub" style="color:#A32D2D">3 overdue</div></div>
      <div class="stat"><div class="stat-label">Won this month</div><div class="stat-value">6</div><div class="stat-sub" style="color:var(--color-text-tertiary)">₹4.2L pipeline</div></div>
      <div class="stat"><div class="stat-label">Active execs</div><div class="stat-value">3</div><div class="stat-sub" style="color:var(--color-text-tertiary)">47 assigned</div></div>
    </div>
    <div class="grid-2">
      <div><div class="sec-title">Recent leads</div>
        ${[['RK','Rahul Kumar','LegalNations','Proposal','#E6F1FB','#0C447C','#FAEEDA','#633806'],['PS','Priya Sharma','USDrop AI','Interested','#EAF3DE','#27500A','#E6F1FB','#0C447C'],['AJ','Amit Joshi','EazyToSell','Follow-up','#FBEAF0','#72243E','#FCEBEB','#A32D2D']].map(r=>`
        <div class="lead-row"><div class="la" style="background:${r[4]};color:${r[5]}">${r[0]}</div>
          <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500;color:var(--color-text-primary)">${r[1]}</div><div style="font-size:11px;color:var(--color-text-tertiary)">${r[2]}</div></div>
          <span class="pill" style="background:${r[6]};color:${r[7]}">${r[3]}</span></div>`).join('')}
      </div>
      <div><div class="sec-title">Team load</div>
        <div class="card">
          ${[['SV','Siddharth V.','16 leads','#E6F1FB','#0C447C'],['NK','Neha K.','14 leads','#EAF3DE','#27500A'],['RB','Rohan B.','17 leads','#FAEEDA','#633806']].map(r=>`
          <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary)">
            <div class="la" style="width:22px;height:22px;font-size:9px;background:${r[3]};color:${r[4]}">${r[0]}</div>
            <span style="font-size:12px;color:var(--color-text-primary);flex:1">${r[1]}</span>
            <span style="font-size:11px;color:var(--color-text-tertiary)">${r[2]}</span>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  } else if (activePage === 'My pipeline') {
    const stages = ['New','Contacted','Interested','Proposal','Won'];
    c.innerHTML = `<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px">`+stages.map((s,i)=>`
      <div style="min-width:152px;flex-shrink:0">
        <div style="font-size:10px;font-weight:600;color:var(--color-text-tertiary);margin-bottom:7px;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.05em">${s}<span class="badge badge-muted">${[8,12,9,11,7][i]}</span></div>
        ${[0,1].map(j=>`<div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 10px;margin-bottom:5px;cursor:pointer;border-left:2.5px solid ${col}">
          <div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px">Lead ${i*2+j+1} Name</div>
          <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:5px">${['LegalNations','USDrop AI','EazyToSell'][j%3]}</div>
          <div style="display:flex;align-items:center;gap:4px"><div class="la" style="width:16px;height:16px;font-size:8px;background:${col}22;color:${col}">SV</div><span style="font-size:10px;color:var(--color-text-tertiary)">Siddharth V.</span></div>
        </div>`).join('')}
      </div>`).join('')+`</div>`;
  } else if (activePage === 'Tasks board') {
    const cols=['Backlog','To do','In progress','Review','Done'];
    c.innerHTML=`<div style="display:flex;gap:8px;overflow-x:auto">`+cols.map((col2,i)=>`
      <div style="min-width:148px;flex-shrink:0">
        <div style="font-size:10px;font-weight:600;color:var(--color-text-tertiary);margin-bottom:7px;display:flex;gap:5px;align-items:center;text-transform:uppercase;letter-spacing:.05em">${col2}<span class="badge badge-muted">${[4,6,5,3,8][i]}</span></div>
        ${[0,1].map(j=>`<div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 10px;margin-bottom:5px;cursor:pointer">
          <div style="font-size:11px;color:var(--color-text-primary);margin-bottom:6px">Task ${i*2+j+1} description</div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span class="pill" style="background:${['#FCEBEB','#FAEEDA','#E6F1FB'][j%3]};color:${['#A32D2D','#633806','#0C447C'][j%3]}">${['Urgent','Medium','Low'][j%3]}</span>
            <div class="la" style="width:18px;height:18px;font-size:8px;background:${col}22;color:${col}">SV</div>
          </div>
        </div>`).join('')}
      </div>`).join('')+`</div>`;
  } else if (activePage === 'All leads') {
    c.innerHTML=`<div style="display:flex;gap:7px;margin-bottom:10px;align-items:center">
      <input placeholder="Search..." style="flex:1;max-width:220px;font-size:12px;padding:5px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)">
      ${['All','New','Follow-up','Proposal'].map((f,i)=>`<span style="padding:4px 9px;font-size:11px;border-radius:20px;cursor:pointer;border:0.5px solid ${i===0?'var(--color-border-primary)':'var(--color-border-tertiary)'};background:${i===0?'var(--color-background-primary)':'transparent'};color:var(--color-text-${i===0?'primary':'secondary'})">${f}</span>`).join('')}
    </div>
    <div style="border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden">
      <div style="background:var(--color-background-secondary);padding:6px 12px;display:grid;grid-template-columns:1.4fr .9fr 75px 75px 90px 60px;font-size:11px;font-weight:500;color:var(--color-text-tertiary)">
        <div>Name</div><div>Vertical</div><div>Stage</div><div>Priority</div><div>Assigned</div><div></div>
      </div>
      ${[['RK','Rahul Kumar','LegalNations','Proposal','High','Siddharth','#E6F1FB','#0C447C'],['PS','Priya Sharma','USDrop AI','Interested','Medium','Neha','#EAF3DE','#27500A'],['AJ','Amit Joshi','EazyToSell','New','Urgent','Rohan','#FBEAF0','#72243E'],['SP','Sneha Patel','LegalNations','Contacted','Low','Siddharth','#FAEEDA','#633806']].map(r=>`
      <div style="padding:7px 12px;border-top:0.5px solid var(--color-border-tertiary);display:grid;grid-template-columns:1.4fr .9fr 75px 75px 90px 60px;align-items:center">
        <div style="display:flex;align-items:center;gap:6px"><div class="la" style="width:22px;height:22px;font-size:9px;background:${r[6]};color:${r[7]}">${r[0]}</div><span style="font-size:12px;color:var(--color-text-primary)">${r[1]}</span></div>
        <span class="pill" style="background:var(--color-background-secondary);color:var(--color-text-secondary);width:fit-content">${r[2]}</span>
        <span style="font-size:11px;color:var(--color-text-secondary)">${r[3]}</span>
        <span style="font-size:11px;color:${r[4]==='Urgent'?'#A32D2D':r[4]==='High'?'#633806':'var(--color-text-tertiary)'}">${r[4]}</span>
        <span style="font-size:11px;color:var(--color-text-secondary)">${r[5]}</span>
        <span style="font-size:11px;color:${col};cursor:pointer;font-weight:500">View</span>
      </div>`).join('')}
    </div>`;
  } else if (activePage === 'Dashboard' && activePortal.id === 'ats') {
    c.innerHTML=`<div class="stat-row">
      <div class="stat"><div class="stat-label">Open roles</div><div class="stat-value">8</div></div>
      <div class="stat"><div class="stat-label">In pipeline</div><div class="stat-value">34</div><div class="stat-sub" style="color:${col}">12 new</div></div>
      <div class="stat"><div class="stat-label">Interviews this week</div><div class="stat-value">6</div></div>
      <div class="stat"><div class="stat-label">Offers sent</div><div class="stat-value">2</div></div>
    </div>
    <div class="sec-title">Active jobs</div>
    ${[['Sales Executive','Sales CRM','3 applicants'],['Legal Ops Associate','LegalNations','7 applicants'],['Tech Support','USDrop AI','2 applicants']].map(r=>`
